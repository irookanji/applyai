services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: applyai
      POSTGRES_PASSWORD: applyai
      POSTGRES_DB: applyai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U applyai -d applyai']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://applyai:applyai@postgres:5432/applyai
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      CORS_ORIGIN: http://localhost:5173
      UPLOADS_DIR: /app/uploads
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '5173:5173'
    environment:
      API_PROXY_TARGET: http://api:3000
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
  web_node_modules:
